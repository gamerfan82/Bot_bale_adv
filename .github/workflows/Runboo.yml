name: دانلود ویدیو و ذخیره در مخزن

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس ویدیوی یوتیوب'
        required: true
      quality:
        description: 'کیفیت (audio/best/480/720/1080...)'
        required: false
        default: '480'
        type: choice
        options: [audio, best, 2160, 1440, 1080, 720, 480, 360]
      zip_password:
        description: 'رمز فایل zip (اختیاری)'
        required: false
        default: ''
      commit_message:
        description: 'پیام کامیت (اختیاری)'
        required: false
        default: 'Add downloaded video [skip ci]'

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yt-dlp and requests
        run: pip install yt-dlp requests

      - name: Install Deno (JS runtime for yt-dlp)
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version

      - name: Start Cloudflare WARP container (SOCKS5 proxy)
        run: |
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP (up to 30s)..."
          for i in {1..10}; do
            sleep 3
            if curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE "warp=(on|plus)"; then
              echo "WARP is ready"
              break
            fi
          done

      - name: Run download script
        env:
          YT_URL: ${{ github.event.inputs.url }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.zip_password }}
        run: |
          python boo.py \
            --url "$YT_URL" \
            --quality "$YT_QUALITY" \
            --proxy socks5://127.0.0.1:1080 \
            --password "$YT_PASSWORD" \
            --output video.zip

      - name: Commit and push video.zip to repository
        env:
          COMMIT_MSG: ${{ github.event.inputs.commit_message }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # پاکسازی فایل‌های قبلی (اگر وجود داشته باشند)
          git rm --cached video.zip 2>/dev/null || true
          
          cp video.zip video_upload.zip
          mv video_upload.zip video.zip
          
          git add video.zip
          
          if git diff --cached --quiet; then
            echo "هیچ تغییری برای کامیت وجود ندارد."
          else
            git commit -m "$COMMIT_MSG"
            RETRY=0
            until git push origin HEAD:${{ github.ref_name }}; do
              RETRY=$((RETRY+1))
              if [ $RETRY -ge 5 ]; then
                echo "Push after 5 retries failed."
                exit 1
              fi
              echo "Push failed, retrying in 10 seconds... ($RETRY/5)"
              sleep 10
              git fetch origin ${{ github.ref_name }}
              git reset --hard origin/${{ github.ref_name }}
              # دوباره فایل را جایگذاری کن (چون reset پاکش می‌کند)
              cp /tmp/video_backup/video.zip ./video.zip 2>/dev/null || cp video.zip ./video.zip
              git add video.zip
              git diff --cached --quiet || git commit -m "$COMMIT_MSG"
            done
          fi

      - name: Upload artifact (optional, as backup)
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video-backup
          path: video.zip
          retention-days: 3
