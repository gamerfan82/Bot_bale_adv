on:
  schedule:
    - cron: '*/25 * * * *'
jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

          
      # مرحله جدید: نصب وابستگی‌های سیستمی (ffmpeg و غیره)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip p7zip-full curl jq bc unzip

      - name: Install yt-dlp and requests
        run: pip install yt-dlp requests

      - name: Install Deno (JS runtime for yt-dlp)
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          # اضافه کردن هم برای مرحله فعلی و هم برای مراحل بعدی
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version   # حالا کار می‌کند

      - name: Start Cloudflare WARP container (SOCKS5 proxy)
        run: |
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP (up to 30s)..."
          for i in {1..10}; do
            sleep 3
            if curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE "warp=(on|plus)"; then
              echo "WARP is ready"
              break
            fi
          done

      - name: Run download script
        env:
          YT_URL: ${{ github.event.inputs.url }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.zip_password }}
        run: |
          python boo.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: |
            video.zip
            offset.json
          retention-days: 7

      - name: Commit to repo (optional)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add offset.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Add offset [skip ci]"
            git push
          fi
